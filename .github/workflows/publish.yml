name: Publish to npm

# Triggers when a GitHub Release is published (same pattern as the ui_kit repo).
# Recommended flow:
#   1. bump `version` in package.json, commit + push to main
#   2. gh release create vX.Y.Z --generate-notes   # creates the tag + release
# Publishing the release fires this workflow (tests -> build -> npm publish).
# Unlike a tag-push trigger, the release event reads this YAML from the release
# target commit (main HEAD), so workflow fixes apply without moving any tag.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npm with provenance
        env:
          # setup-node escribe un .npmrc con `_authToken=${NODE_AUTH_TOKEN}` y
          # setea NODE_AUTH_TOKEN como env var. Cuando npm CLI ve un token
          # configurado (incluso vacío/inválido) usa token-auth y nunca dispara
          # el flow OIDC del Trusted Publisher. Limpiamos ambos para forzar
          # OIDC. El OIDC automático requiere npm >= 11.5.1; Node 22 LTS
          # bundlea npm 10, así que actualizamos npm antes de publicar.
          # Pin a npm@11 (no @latest): npm@12.0.0 exige Node >=22 y además
          # rompe `--provenance` (MODULE_NOT_FOUND: sigstore). npm@11 es
          # estable, trae OIDC (>=11.5.1) y provenance funcionando.
          NPM_CONFIG_USERCONFIG: ''
          NODE_AUTH_TOKEN: ''
        run: |
          npm install -g npm@11
          echo "npm version: $(npm --version)"
          npm publish --provenance --access public
