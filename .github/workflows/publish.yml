name: Publish to npm

# Triggers on pushes of version tags (e.g. v0.3.0).
# Recommended flow:
#   pnpm version minor          # bumps package.json and creates the tag
#   git push --follow-tags      # pushes the tag, this workflow runs
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Debug OIDC claims (temporary)
        run: |
          set -e
          AUDIENCE="npm:registry.npmjs.org"
          TOKEN_RESPONSE=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUDIENCE}")
          TOKEN=$(echo "${TOKEN_RESPONSE}" | jq -r .value)
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to get OIDC token. Response: ${TOKEN_RESPONSE}"
            exit 1
          fi
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2)
          while [ $((${#PAYLOAD} % 4)) -ne 0 ]; do PAYLOAD="${PAYLOAD}="; done
          echo "OIDC token claims sent to npm:"
          echo "$PAYLOAD" | tr '_-' '/+' | base64 -d | jq .

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
